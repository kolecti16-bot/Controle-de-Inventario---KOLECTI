<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Ativos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{--bg:#F5F4EF;--panel:#FFFFFF;--ink:#1E241F;--ink-soft:#5B6459;--sidebar:#1B2420;--sidebar-ink:#C8D2C6;--moss:#3F6B4F;--moss-dark:#2C4D38;--moss-light:#E7EFE7;--amber:#C97A2B;--amber-light:#FBEDDD;--red:#B4432F;--red-light:#F8E7E2;--line:#E4E1D8;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--sidebar);color:var(--sidebar-ink);flex-shrink:0;display:flex;flex-direction:column;padding:22px 14px;}
.brand{font-weight:700;font-size:16px;color:#fff;letter-spacing:.3px;padding:0 8px 4px;}
.brand-sub{font-size:11px;color:#7C8A7C;padding:0 8px 22px;letter-spacing:.4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--sidebar-ink);margin-bottom:2px;transition:background .15s;}
.nav-item:hover{background:#26332B;}
.nav-item.active{background:var(--moss);color:#fff;}
.nav-icon{width:16px;text-align:center;font-size:14px;opacity:.9;}
.sidebar-foot{margin-top:auto;font-size:11px;color:#657065;padding:10px 8px;line-height:1.5;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.scanbar{background:var(--sidebar);padding:16px 28px 22px;}
.scanbar-inner{background:#26332B;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:1px solid #34433A;}
.scanbar-inner.hit{border-color:var(--moss);box-shadow:0 0 0 3px rgba(63,107,79,.35);}
.scan-dot{width:9px;height:9px;border-radius:50%;background:#5A6B5C;flex-shrink:0;}
.scan-dot.live{background:#7FD99A;box-shadow:0 0 8px #7FD99A;}
#scanInput{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--mono);font-size:16px;letter-spacing:.5px;}
.scan-hint{font-size:11px;color:#7C8A7C;font-family:var(--mono);}
.content{padding:26px 28px 40px;overflow-y:auto;}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
.stat-num{font-size:26px;font-weight:700;font-family:var(--mono);}
.stat-label{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.stat-card.warn .stat-num{color:var(--amber);}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);}
.panel-head h3{font-size:14px;font-weight:600;}
.toolbar{display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center;}
input,select,textarea{font-family:var(--sans);font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--moss);}
.btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 14px;border-radius:7px;border:none;cursor:pointer;}
.btn-primary{background:var(--moss);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-sm{padding:5px 10px;font-size:12px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);background:#FAFAF7;}
td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;}
.code{font-family:var(--mono);font-weight:600;color:var(--moss-dark);}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:var(--moss-light);color:var(--moss-dark);}
.badge-status{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-ativo{background:var(--moss-light);color:var(--moss-dark);}
.badge-manutencao{background:var(--amber-light);color:var(--amber);}
.badge-baixado{background:var(--red-light);color:var(--red);}
.overlay{position:fixed;inset:0;background:rgba(20,25,20,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid .full{grid-column:1/-1;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
.close-x{position:absolute;top:18px;right:18px;cursor:pointer;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.2s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand" style="padding:0 8px 8px; margin-top:-10px;"><img src="LOGOTIPO BRANCO RGB.png" alt="Kolecti" style="max-width: 140px; height: auto;"></div>
    <div class="brand-sub">Controle Patrimonial</div>
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">◆</span>Dashboard</div>
    <div class="nav-item" data-page="lista"><span class="nav-icon">≡</span>Todos os Ativos</div>
    <div class="nav-item" data-page="conferencia"><span class="nav-icon">✓</span>Modo Conferência</div>
    <div class="nav-item" data-page="cadastrar"><span class="nav-icon">+</span>Cadastrar Ativo</div>
    <div class="sidebar-foot">Conectado ao Google Sheets.</div>
  </div>
  <div class="main">
    <div class="scanbar">
      <div class="scanbar-inner" id="scanWrap">
        <div class="scan-dot" id="scanDot"></div>
        <div style="display:flex;align-items:center;gap:8px;flex:1;">
            <input id="scanInput" type="text" placeholder="Escaneie ou digite..." autocomplete="off" style="flex:1;">
            <button id="btnCamera" class="btn btn-primary" type="button">📷</button>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end;">
          <button class="btn btn-ghost btn-sm" id="btnRefresh" type="button">↻ Atualizar</button>
          <div id="lastUpdateText" style="font-size:10px; color:#7C8A7C;">atualizando...</div>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<div class="overlay" id="cameraOverlay"><div class="modal" style="max-width:700px"><h3>Escaneie o Código</h3><video id="cameraVideo" autoplay playsinline style="width:100%;border-radius:8px;background:#000;"></video><div style="margin-top:15px;text-align:right"><button class="btn btn-ghost" id="btnCloseCamera">Fechar</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
let CATS = ["Computadores","Materiais de Operação","Móveis","Periféricos","TV/Monitores"];
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzk6SrlqKmgGUFSyR1y3MiMoH71V64BC8m30o8Njf3qgerotu5Ktj3HiFPooA3TxKui/exec";
let ativos = {}, isUpdating = false;

async function loadAll(silent){
  if(isUpdating) return; isUpdating = true;
  const el = document.getElementById('lastUpdateText');
  try{
    const res = await fetch(SHEET_URL, {method:'GET', mode:'cors', cache:'no-cache'});
    const json = await res.json();
    if(json.status === 'ok'){
      ativos = {};
      json.data.forEach(obj=>{ if(obj.codigo){ ativos[String(obj.codigo)] = obj; if(obj.categoria && !CATS.includes(obj.categoria)) CATS.push(obj.categoria); }});
      CATS.sort(); render(); if(el) el.textContent = 'atualizado ' + new Date().toLocaleTimeString();
    }
  }catch(e){ if(el) el.textContent = 'falha na conexão'; }
  isUpdating = false;
}

function render(){
  const c = document.getElementById('content');
  if(currentPage==='dashboard') c.innerHTML = renderDashboard();
  else if(currentPage==='lista') c.innerHTML = renderLista();
  else if(currentPage==='conferencia') c.innerHTML = renderConferencia();
  else if(currentPage==='cadastrar') c.innerHTML = renderCadastro();
  attachPageEvents();
}

function renderDashboard(){
  const list = Object.values(ativos);
  return `
    <div class="page-title">Dashboard</div>
    <div class="stats">
      <div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">Total de ativos</div></div>
      <div class="stat-card"><div class="stat-num">${list.filter(a=>a.status==='Em Manutenção').length}</div><div class="stat-label">Em manutenção</div></div>
    </div>
    <div class="panel"><div class="panel-head"><h3>Cadastrados recentemente</h3></div>
    <table><tbody>${list.slice().sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm)).slice(0,6).map(a=>`<tr><td class="code">${a.codigo}</td><td>${a.descricao}</td></tr>`).join('')}</tbody></table></div>`;
}

function renderLista(){
  return `<div class="page-title">Ativos</div>
    <div class="panel"><div class="toolbar"><input type="text" id="searchBox" placeholder="Buscar...">
    <button class="btn btn-primary" id="btnNovo">+ Novo Ativo</button></div>
    <div id="tableWrap"><table><tbody>${Object.values(ativos).map(a=>`<tr class="tbl-row" data-code="${a.codigo}"><td class="code">${a.codigo}</td><td>${a.descricao}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function renderConferencia(){ return `<div class="page-title">Conferência</div><div class="panel"><div class="panel-head"><h3>Pendentes</h3></div><table><tbody>${Object.values(ativos).filter(a=>!(a.ultimaConferencia && new Date(a.ultimaConferencia).toDateString()===new Date().toDateString())).map(a=>`<tr class="tbl-row" data-code="${a.codigo}"><td class="code">${a.codigo}</td><td>${a.descricao}</td></tr>`).join('')}</tbody></table></div>`; }

function renderCadastro(){ return `<div class="page-title">Cadastro</div><div class="panel" style="padding:20px;">${formHtml()}</div>`; }

function formHtml(a){ a = a || {codigo:'', descricao:'', categoria:CATS[0], status:'Ativo'};
  return `
    <div class="form-grid">
      <div><label>Código</label><input type="text" id="f_codigo" value="${a.codigo}" ${a.codigo?'readonly':''}></div>
      <div><label>Categoria</label><select id="f_categoria">${CATS.map(c=>`<option ${c===a.categoria?'selected':''}>${c}</option>`).join('')}<option value="NOVA_CATEGORIA">+ Nova...</option></select></div>
      <div class="full"><label>Descrição</label><input type="text" id="f_descricao" value="${a.descricao}"></div>
      <div><label>Status</label><select id="f_status">['Ativo','Em Manutenção','Baixado'].map(s=>`<option ${s===a.status?'selected':''}>${s}</option>`).join('')</select></div>
    </div>
    <div class="modal-actions"><button class="btn btn-primary" id="btnSave">Salvar</button></div>`;
}

function openModal(code){
  const a = ativos[code];
  const body = document.getElementById('modalBody');
  body.innerHTML = `<button class="close-x" id="closeModal">✕</button><h3>${a?'Editar':'Novo'}</h3>${formHtml(a, code)}`;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('closeModal').onclick = ()=>document.getElementById('modalOverlay').classList.remove('show');
  
  document.getElementById('f_categoria').onchange = (e)=>{ if(e.target.value==='NOVA_CATEGORIA'){ let n=prompt('Nome da categoria:'); if(n){ CATS.push(n); CATS.sort(); render(); openModal(code); } } };
  
  document.getElementById('btnSave').onclick = async()=>{
    const obj = {codigo:document.getElementById('f_codigo').value, descricao:document.getElementById('f_descricao').value, categoria:document.getElementById('f_categoria').value, status:document.getElementById('f_status').value, criadoEm:new Date().toISOString()};
    await fetch(SHEET_URL, {method:'POST', body:JSON.stringify({action:'upsert', item:obj})});
    document.getElementById('modalOverlay').classList.remove('show'); loadAll();
  };
}

function attachPageEvents(){
  document.querySelectorAll('.tbl-row').forEach(r=>r.onclick=()=>openModal(r.dataset.code));
  document.getElementById('btnNovo').onclick = ()=>openModal();
}

// Câmera
const codeReader = new ZXing.BrowserBarcodeReader();
document.getElementById('btnCamera').onclick = async()=>{
  document.getElementById('cameraOverlay').classList.add('show');
  try{ const result = await codeReader.decodeFromInputVideoDevice(undefined, 'cameraVideo'); 
       document.getElementById('scanInput').value = result.text; 
       document.getElementById('cameraOverlay').classList.remove('show'); 
       handleScan(result.text); 
  }catch(e){ toast('Erro câmera'); }
};
document.getElementById('btnCloseCamera').onclick = ()=>document.getElementById('cameraOverlay').classList.remove('show');

document.querySelectorAll('.nav-item').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active'); currentPage=el.dataset.page; render();
});

loadAll();
setInterval(()=>loadAll(true), 80000);
document.getElementById('btnRefresh').onclick = ()=>loadAll();
async function handleScan(code){
  if(ativos[code]){ ativos[code].ultimaConferencia=new Date().toISOString(); await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'upsert', item:ativos[code]})}); toast('Conferido!'); render(); }
  else openModal(code);
}
</script>
</body>
</html>
